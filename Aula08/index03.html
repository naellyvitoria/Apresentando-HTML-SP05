<!DOCTYPE html>
<html lang="pt-br">
<head>
  <title>Aula 08 HTML</title>
</head>
<body>
  
  <!-- Utilizando a tag picture para tamanhos diferentes de tela -->

  <h2>Utilizando a tag picture</h2>

  <picture>
    <source media="(min-width: 650px)" srcset="celular-imagem.jpg">
    <source media="(min-width: 465px)" srcset="laptop-imagem.jpg">
    <img src="cafe-imagem.jpg">
  </picture>

</body>
</html>
