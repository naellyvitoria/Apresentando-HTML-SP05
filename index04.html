<!DOCTYPE html>
<html lang="pt-br">
<head>
  <title>Aula 10 HTML</title>

  <style>

    .teste-btn {
      background-color: goldenrod;
      border: none;
      font-size: 22px;
      padding: 12px;
      border-radius: 2px;
      cursor: pointer;
    }

    .teste-btn:hover {
      background-color: #58430d;
    }

  </style>

</head>
<body>
  
  <!-- Utilizando botões no HTML -->

  <h2>Exemplo de botão no HTML</h2>

  <button>Isso é um botão</button>

  <hr>

  <h2>Alterando estilo de botão</h2>

  <button class="teste-btn">Clique Agora</button>

</body>
</html>
