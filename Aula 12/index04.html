<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aula 12 HTML</title>
</head>
<body>
  
  <!-- Utilizando formulários no HTML -->

  <h2>Exemplo de formulários no HTML</h2>

  <form>
    <label for="p-nome">Primeiro Nome:</label> <br>
    <input type="text" name="p-nome" id="p-nome"> <br><br>
    <label for="s-nome">Segundo Nome:</label> <br>
    <input type="text" name="s-nome" id="s-nome"> <br><br>
    <button type="submit">Enviar</button>
  </form>

  <hr>

  <h2>Exemplo de input type radio (botão de opções)</h2>

  <form>
    <input type="radio" name="linguagem-fav" id="l-html" value="HTML">
    <label for="l-html">HTML</label> <br>
    <input type="radio" name="linguagem-fav" id="l-css">
    <label for="l-css">CSS</label> <br>
    <input type="radio" name="linguagem-fav" id="l-js">
    <label for="l-js">JavaScript</label>
  </form>

  <hr>

  <h2>Exemplo de input type checkbox (caixa de opção)</h2>

  <form>
    <input type="checkbox" name="cor-fav" id="cor-azul" value="azul">
    <label for="cor-azul">Azul</label> <br>
    <input type="checkbox" name="cor-fav" id="cor-vermelho" value="vermelho">
    <label for="cor-vermelho">Vermelho</label> <br>
    <input type="checkbox" name="cor-fav" id="cor-verde" value="verde">
    <label for="cor-verde">Verde</label>
  </form>

</body>
</html>
