<!DOCTYPE html>
<html lang="pt-br">
<head>
  <title>Aula 11 HTML</title>
</head>
<body>
  
  <!-- Continuação da aula 10 - botões em HTML -->

  <h2>Exemplo de botão desabilitado</h2>

  <button disabled>Isso é um botão</button>

  <hr>

  <h2>Exemplo de botão com JavaScript</h2>

  <button onclick="alert('Somente a dor coletiva gera união!')">Clique aqui</button>

  <hr>

  <h2>Exemplo de botões em formulários</h2>

  <form>
    <label>Primeiro Nome</label>
    <input type="text">
    <button type="submit">Enviar</button>
    <button type="reset">Limpar</button>
  </form>

</body>
</html>
