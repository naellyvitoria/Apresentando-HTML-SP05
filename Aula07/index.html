<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <title>Aula 07 HTML</title>
  </head>
  <body>
    
    <h2>Trabalhando com links no HTML</h2>

    <!-- Exemplo de URL absoluto -->
    <a href="https://www.spotify.com">Clique aqui para ser redirecionado ao Spotify</a>

    <br>

    <!-- Exemplo de URL relativo -->
    <a href="exemplo.html">Clique aqui para abrir uma página interna</a>

    <hr>

    <!-- Exemplo de imagem como link -->
    <h2>Utilizando imagem como link</h2>
    <a href="https://www.github.com/dicesarrr">
      <img src="nyan-cat.gif" style="width: 100px;">
    </a>

    <hr>

    <!-- Exemplo de link com e-mail -->
    <h2>Utilizando link para enviar e-mail</h2>

    <a href="mailto:professor.richardcesar@gmail.com">Enviar E-mail</a>

    <hr>

    <!-- Exemplo de botão para carregar link -->
    <h2>Carregando link com botão</h2>

    <button onclick="document.location='exemplo.html'">Abrir Link</button>

    <hr>

    <!-- Atribuindo o title para um link -->
    <h2>Utilizando o atributo title em link</h2>
    <a href="#" title="Clique aqui para carregar um link">Clique aqui!</a>

  </body>
</html>
