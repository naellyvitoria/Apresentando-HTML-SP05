      /* Exemplo de link como botão */
      a:link, a:visited {
        background-color: crimson;
        padding: 30px 80px;
        color: bisque;
        text-decoration: none;
        font-family: sans-serif;
        font-weight: bold;
        border: 4px solid black;
        display: inline-block;
      }

      a:hover, a:active {
        background-color: bisque;
        padding: 30px 80px;
        color: black;
        text-decoration: none;
        font-family: sans-serif;
        font-weight: bold;
        border: 4px solid crimson;
        display: inline-block;
        transition: .5s;
      }

    </style>

  </head>
  <body>

    <!-- Exemplos de estilos em links -->
    <h2>Alterando estilos em links</h2>

    <!-- <a href="#####">Clique Aqui!</a> -->

     <h2>Usando link como botão</h2>
