<!doctype html>
<html lang="pt-br">
  <head>
    <title>Aula 09 HTML</title>

    <style>
      ul {
        list-style-type: none;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: crimson;
      }

      li {
        float: left;
      }

      li a {
        display: block;
        color: blanchedalmond;
        text-align: center;
        padding: 16px;
        text-decoration: none;
        font-family: sans-serif;
      }

      li a:hover {
        color: crimson;
        background-color: blanchedalmond;
        transition: 0.5s;
      }

    </style>

  </head>
  <body>
    
    <!-- Exemplo de link dentro de um item de lista -->

    <h2>Criando um layout de menu para navegação</h2>

    <ul>
      <li><a href="#home">Home</a></li>
      <li><a href="#sobre">Sobre</a></li>
      <li><a href="#produtos">Produtos</a></li>
      <li><a href="#contatos">Contatos</a></li>
    </ul>

  </body>
</html>
