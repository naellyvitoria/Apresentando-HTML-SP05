<!DOCTYPE html>
<html lang="pt-br">
<head>
  <title>Aula 09 HTML</title>
</head>
<body>
  
  <!-- Definindo lista não ordenada no HTML -->

  <h2>Exemplo de lista não ordenada em HTML (tag ul)</h2>

  <ul>
    <li>Laranja</li>
    <li>Morango</li>
    <li>Uva</li>
  </ul>

  <hr>

  <!-- Definindo lista ordenada no HTML -->

  <h2>Exemplo de lista ordenada em HTML (tag ol)</h2>

  <ol>
    <li>Tangerina</li>
    <li>Pêra</li>
    <li>Maçã</li>
  </ol>

  <hr>

  <!-- Definindo lista descritiva no HTML -->

  <h2>Exemplo de lista descritiva em HTML (tag dl)</h2>

  <dl>
    <dt>Café</dt>
    <dd>- Bebida quente</dd>
    <dt>Suco</dt>
    <dd>- Bebida fria</dd>
  </dl>

</body>
</html>
