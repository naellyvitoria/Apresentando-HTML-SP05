<!doctype html>
<html lang="pt-br">
  <head>
    <title>Aula 09 HTML</title>
  </head>
  <body>
    <!-- Listas não ordenadas -->

    <h2>Trabalhando com listas não ordenadas</h2>

    <!-- Exemplos de marcadores de lista não ordenada-->

    <ul style="list-style-type: disc">
      <li>Laranja</li>
      <li>Manga</li>
      <li>Carambola</li>
    </ul>

    <hr />

    <ul style="list-style-type: circle">
      <li>Café</li>
      <li>Suco</li>
      <li>Água</li>
    </ul>

    <hr />

    <ul style="list-style-type: square">
      <li>10</li>
      <li>40</li>
      <li>70</li>
    </ul>

    <hr />

    <ul style="list-style-type: none">
      <li>Moto</li>
      <li>Carro</li>
      <li>Caminhão</li>
    </ul>

    <hr />

    <!-- Exemplos de listas não ordenadas aninhadas -->

    <h2>Listas aninhadas</h2>

    <ul>
      <li>Laranja</li>
      <li>Maçã</li>
      <li>Banana</li>
      <ul>
        <li>Carro</li>
        <li>Moto</li>
        <li>Barco</li>
      </ul>
      <li>Pêra</li>
      <li>Uva</li>
    </ul>
  </body>
</html>
