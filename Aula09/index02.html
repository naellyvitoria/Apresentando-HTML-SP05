<!DOCTYPE html>
<html lang="pt-br">
<head>
  <title>Aula 09 HTML</title>

  <style>
    table, th, td {
      border: 2px solid black;
    }
  </style>

</head>
<body>
  
  <!-- Adicionando Tabelas no HTML -->

  <h2>Definindo tabelas em HTML</h2>

  <table style="width: 100%;">
    <tr>
      <th>Título 1</th>
      <th>Título 2</th>
      <th>Título 3</th>
    </tr>
    <tr>
      <td>Laranja</td>
      <td>Banana</td>
      <td>Maçã</td>
    </tr>
    <tr>
      <td>20</td>
      <td>65</td>
      <td>90</td>
    </tr>
  </table>

</body>
</html>
