<!DOCTYPE html>
<html lang="pt-br">
<head>
  <title>Aula 09 HTML</title>
</head>
<body>
  
  <!-- Elementos em bloco e elemento em linha -->

  <h2>Exemplo de elementos a nível de bloco e a nível de linha (Inline e Block elements)</h2>

  <br>

  <h4>Exemplo de elementos em bloco: </h4>
  <p style="border: 2px solid black;">Somente a dor coletiva gera união.</p>
  <div style="border: 2px solid black;">Somente a dor coletiva gera união.</div>

  <br>

  <h4>Exemplo de elementos em linha: </h4>
  <p>Somente a <span style="border: 2px solid black;">dor coletiva</span> gera união.</p>

</body>
</html>
